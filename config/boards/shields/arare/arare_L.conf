# EVQWGD001 Rotary encoder
CONFIG_EC11=y
CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y

# P0.02/P0.03 are NFC pins by default; reconfigure as GPIO
CONFIG_NFCT_PINS_AS_GPIOS=y

# RGB LED battery indicator (via zmk-rgbled-widget)
CONFIG_RGBLED_WIDGET=y
CONFIG_ZMK_WIDGET_BATTERY_STATUS_SHOW_PERCENTAGE=y
CONFIG_RGBLED_WIDGET_BATTERY_LEVEL_HIGH=80
CONFIG_RGBLED_WIDGET_BATTERY_LEVEL_MEDIUM=30
CONFIG_RGBLED_WIDGET_BATTERY_LEVEL_LOW=10

CONFIG_ZMK_BATTERY_REPORTING=y
