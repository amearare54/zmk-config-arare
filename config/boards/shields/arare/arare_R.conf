# PMW3610 Trackball
CONFIG_PMW3610=y
CONFIG_PMW3610_CPI=400
CONFIG_PMW3610_POLLING_RATE_125_MS=y
CONFIG_PMW3610_ORIENTATION_180=y
CONFIG_PMW3610_SCROLL_X_INVERTED=y
CONFIG_ZMK_MOUSE_WORK_QUEUE_DEDICATED=y

# Automouse timeout (ms)
CONFIG_PMW3610_AUTOMOUSE_LAYER_TIMEOUT_MS=700

# P0.02/P0.03 are NFC pins by default; reconfigure as GPIO
CONFIG_NFCT_PINS_AS_GPIOS=y

# RGB LED battery indicator (via zmk-rgbled-widget)
CONFIG_RGBLED_WIDGET=y
CONFIG_ZMK_WIDGET_BATTERY_STATUS_SHOW_PERCENTAGE=y
CONFIG_RGBLED_WIDGET_BATTERY_LEVEL_HIGH=80
CONFIG_RGBLED_WIDGET_BATTERY_LEVEL_MEDIUM=30
CONFIG_RGBLED_WIDGET_BATTERY_LEVEL_LOW=10

CONFIG_ZMK_BATTERY_REPORTING=y

# BT split peripheral performance
CONFIG_ZMK_BLE_SPLIT_PERIPHERAL_LATENCY=0
CONFIG_BT_PERIPHERAL_PREF_MIN_INT=6
CONFIG_BT_PERIPHERAL_PREF_MAX_INT=12
